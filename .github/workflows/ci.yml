name: ci

on:
  push:
    branches:
      - main
      - dev
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag name to publish (for example v1.0.0)
        required: false
        type: string

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Ruff
        run: ruff check src tests

      - name: Mypy
        run: mypy src

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests
        run: pytest tests -q

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tool
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Generate checksums
        run: sha256sum dist/* > dist/SHA256SUMS.txt

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Generate release notes
        env:
          RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}
        run: |
          prev_tag=$(git tag --sort=-version:refname | grep '^v' | grep -Fxv "$RELEASE_TAG" | head -n 1 || true)
          {
            echo "## kube-saver ${RELEASE_TAG}"
            echo
            echo "Production release for kube-saver with self-contained CLI, TUI, reporting, API, and Docker delivery."
            echo
            echo "### Included in this release"
            echo "- Interactive TUI for Kubernetes cost and waste visibility"
            echo "- Self-contained HTML report generation"
            echo "- Local notification and PR-plan output"
            echo "- Read-only HTTP API endpoints"
            echo "- Docker image publication to Docker Hub"
            echo
            echo "### Build artifacts"
            echo "- Python wheel and source distribution attached to this release"
            echo "- SHA256 checksums included"
            echo
            echo "### Changes in this release"
            if [[ -n "$prev_tag" ]]; then
              git log --no-merges --pretty='- %s (%h)' "$prev_tag..HEAD"
              echo
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${prev_tag}...${RELEASE_TAG}"
            else
              git log --no-merges --pretty='- %s (%h)'
            fi
          } > release_notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          body_path: release_notes.md
          files: |
            dist/*

  docker:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/kube-saver:${{ github.event.inputs.release_tag || github.ref_name }}
